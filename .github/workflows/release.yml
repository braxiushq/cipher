name: Release
# SPDX-License-Identifier: AGPL-3.0-only
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux (amd64)
        run: |
          bun build --compile --minify --sourcemap --target=bun-linux-x64-modern index.tsx --outfile cipher-${{ github.ref_name }}-linux-amd64 --external react-devtools-core
          gzip -9 cipher-${{ github.ref_name }}-linux-amd64

      - name: Build Linux (arm64)
        run: |
          bun build --compile --minify --sourcemap --target=bun-linux-arm64 index.tsx --outfile cipher-${{ github.ref_name }}-linux-arm64 --external react-devtools-core
          gzip -9 cipher-${{ github.ref_name }}-linux-arm64

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cipher-${{ github.ref_name }}-linux-amd64.gz
            cipher-${{ github.ref_name }}-linux-arm64.gz
          generate_release_notes: true
