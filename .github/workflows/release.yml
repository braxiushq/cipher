name: Release
# SPDX-License-Identifier: AGPL-3.0-only
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build Linux (amd64)
        run: |
          bun build --compile --minify-syntax --minify-whitespace --sourcemap --target=bun-linux-x64-modern --define 'process.env.APP_VERSION="${{ env.APP_VERSION }}"' index.tsx --outfile cipher-${{ github.ref_name }}-linux-amd64

      - name: Build Linux (arm64)
        run: |
          bun build --compile --minify-syntax --minify-whitespace --sourcemap --target=bun-linux-arm64 --define 'process.env.APP_VERSION="${{ env.APP_VERSION }}"' index.tsx --outfile cipher-${{ github.ref_name }}-linux-arm64

      - name: Build macOS (arm64)
        run: |
          bun build --compile --minify-syntax --minify-whitespace --sourcemap --target=bun-darwin-arm64 --define 'process.env.APP_VERSION="${{ env.APP_VERSION }}"' index.tsx --outfile cipher-${{ github.ref_name }}-darwin-arm64

      - name: Build Windows (amd64)
        run: |
          bun build --compile --minify-syntax --minify-whitespace --sourcemap --target=bun-windows-x64-modern --define 'process.env.APP_VERSION="${{ env.APP_VERSION }}"' index.tsx --outfile cipher-${{ github.ref_name }}-windows-amd64.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cipher-${{ github.ref_name }}-linux-amd64
            cipher-${{ github.ref_name }}-linux-arm64
            cipher-${{ github.ref_name }}-darwin-arm64
            cipher-${{ github.ref_name }}-windows-amd64.exe
          generate_release_notes: true
